<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CSS Quest — 設計師的 CSS 冒險</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ───────── CSS Variables ───────── */
:root {
  --bg: #0F172A;
  --bg2: #1E293B;
  --bg3: #263145;
  --primary: #38BDF8;
  --primary-dim: rgba(56,189,248,0.15);
  --success: #10B981;
  --success-dim: rgba(16,185,129,0.15);
  --error: #F43F5E;
  --error-dim: rgba(244,63,94,0.15);
  --warn: #FBBF24;
  --warn-dim: rgba(251,191,36,0.15);
  --text: #F8FAFC;
  --text2: #94A3B8;
  --text3: #64748B;
  --border: rgba(148,163,184,0.12);
  --border2: rgba(148,163,184,0.22);
  --glow: 0 0 20px rgba(56,189,248,0.3);
  --radius: 12px;
  --radius-lg: 18px;
  --font-display: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-code: 'JetBrains Mono', monospace;
}

/* ───────── Reset ───────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  -webkit-tap-highlight-color: transparent;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
input, textarea { font-family: var(--font-code); color: inherit; }
* { -webkit-overflow-scrolling: touch; }

/* ───────── Scrollbar ───────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ───────── App Shell ───────── */
#app { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; overflow: hidden; }

/* ───────── Screens ───────── */
.screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
.screen.active { opacity: 1; pointer-events: all; }

/* ───────── Nav Bar ───────── */
.nav {
  flex-shrink: 0;
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: rgba(15,23,42,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--primary), #818CF8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-logo span { -webkit-text-fill-color: var(--text2); font-weight: 400; font-size: 13px; letter-spacing: 0; margin-left: 6px; }
.nav-actions { display: flex; gap: 8px; align-items: center; }
.nav-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--primary); background: var(--primary-dim); }
.nav-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text2);
  padding: 6px 10px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.nav-back:hover { color: var(--text); border-color: var(--border2); }

/* ═══════════════════════════════
   HOME SCREEN
═══════════════════════════════ */
#screen-home {
  overflow-y: auto;
  padding-bottom: 24px;
}
.home-hero {
  padding: 32px 20px 24px;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -40px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(56,189,248,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.hero-greeting {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--primary);
  margin-bottom: 8px;
  font-weight: 600;
}
.hero-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  line-height: 1.25;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.hero-sub { color: var(--text2); font-size: 14px; line-height: 1.6; max-width: 320px; }

/* Streak Card */
.streak-card {
  margin: 0 16px 16px;
  background: linear-gradient(135deg, rgba(56,189,248,0.12), rgba(129,140,248,0.08));
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 16px;
}
.streak-icon { font-size: 36px; line-height: 1; }
.streak-info { flex: 1; }
.streak-num {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1.2;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}
.streak-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
.streak-days { display: flex; gap: 4px; margin-top: 10px; }
.streak-dot {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--text3);
  transition: all 0.2s;
}
.streak-dot.done { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }
.streak-dot.today { background: var(--primary); color: var(--bg); box-shadow: var(--glow); }

/* Stats Row */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; padding: 0 16px 16px;
}
.stat-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  text-align: center;
  transition: all 0.2s;
}
.stat-card:active { transform: scale(0.97); }
.stat-num {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 4px;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}
.stat-lbl { font-size: 11px; color: var(--text2); }

/* Section */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px 10px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.section-link { font-size: 12px; color: var(--primary); }

/* Continue Card */
.continue-card {
  margin: 0 16px 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  cursor: pointer;
  transition: all 0.25s;
}
.continue-card:hover { border-color: var(--primary); transform: translateY(-1px); }
.continue-card:active { transform: scale(0.98); }
.continue-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.continue-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--primary-dim);
  border: 1px solid rgba(56,189,248,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.continue-meta { flex: 1; }
.continue-chapter { font-size: 11px; color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.continue-name { font-size: 15px; font-weight: 600; margin-top: 2px; }
.continue-badge {
  background: var(--warn-dim);
  border: 1px solid rgba(251,191,36,0.3);
  color: var(--warn);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 600;
}
.progress-bar {
  height: 6px;
  background: var(--bg3);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 6px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #818CF8);
  border-radius: 99px;
  transition: width 0.6s ease;
}
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); }

/* Chapter List */
.chapter-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.chapter-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.chapter-item:hover { border-color: var(--border2); transform: translateX(3px); }
.chapter-item:active { transform: scale(0.98); }
.chapter-item.locked { opacity: 0.45; cursor: not-allowed; }
.chapter-num {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display);
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.chapter-num.done { background: var(--success-dim); border-color: var(--success); color: var(--success); }
.chapter-num.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }
.chapter-info { flex: 1; min-width: 0; }
.chapter-name { font-size: 14px; font-weight: 600; }
.chapter-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
.chapter-tag {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}
.tag-done { background: var(--success-dim); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.tag-active { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(56,189,248,0.3); }
.tag-locked { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }

/* Weakness Panel */
.weakness-panel {
  margin: 0 16px 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.weakness-items { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.weakness-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--bg3);
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.weakness-item:hover { border-color: var(--warn); }
.weakness-icon { font-size: 16px; }
.weakness-text { flex: 1; font-size: 13px; }
.weakness-btn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--warn-dim);
  color: var(--warn);
  border: 1px solid rgba(251,191,36,0.3);
  font-weight: 600;
  transition: all 0.2s;
}
.weakness-item:hover .weakness-btn { background: var(--warn); color: var(--bg); }

/* Badges */
.badges-scroll {
  display: flex; gap: 10px;
  padding: 0 16px 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
.badges-scroll::-webkit-scrollbar { display: none; }
.badge-card {
  flex-shrink: 0;
  width: 80px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 8px;
  text-align: center;
  transition: all 0.2s;
}
.badge-card.earned { border-color: rgba(251,191,36,0.4); background: rgba(251,191,36,0.05); }
.badge-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.badge-name { font-size: 10px; color: var(--text2); line-height: 1.3; }
.badge-card.earned .badge-name { color: var(--warn); }
.badge-card.locked-badge { opacity: 0.35; filter: grayscale(1); }

/* ═══════════════════════════════
   CHAPTER SELECT SCREEN
═══════════════════════════════ */
#screen-chapter { overflow-y: auto; }
.level-grid {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.level-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.level-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--primary);
  opacity: 0;
  transition: opacity 0.2s;
}
.level-card:hover::before { opacity: 1; }
.level-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.level-card:active { transform: scale(0.97); }
.level-card.done::before { opacity: 1; background: var(--success); }
.level-card.locked-card { opacity: 0.4; cursor: not-allowed; }
.level-num {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.level-title { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
.level-meta { display: flex; align-items: center; justify-content: space-between; }
.level-diff {
  display: flex; gap: 3px;
}
.diff-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--bg3); }
.diff-dot.filled { background: var(--primary); }
.level-status { font-size: 14px; }

/* ═══════════════════════════════
   GAME SCREEN
═══════════════════════════════ */
#screen-game {
  display: flex;
  flex-direction: column;
}
.game-nav {
  flex-shrink: 0;
  height: 54px;
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.game-progress-wrap { flex: 1; }
.game-progress-track {
  height: 6px;
  background: var(--bg3);
  border-radius: 99px;
  overflow: hidden;
}
.game-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #818CF8);
  border-radius: 99px;
  transition: width 0.5s ease;
}
.game-level-label {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 4px;
  display: flex; justify-content: space-between;
}
.game-lives { display: flex; gap: 4px; }
.life-icon { font-size: 14px; transition: all 0.3s; }
.life-icon.lost { filter: grayscale(1); opacity: 0.35; transform: scale(0.85); }

/* Game Body */
.game-body {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Preview Area */
.preview-area {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 12px 14px 0;
  gap: 8px;
}
.preview-tabs {
  display: flex; gap: 6px;
  align-items: center;
}
.preview-tab {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  transition: all 0.2s;
}
.preview-tab.active {
  background: var(--primary-dim);
  border-color: var(--primary);
  color: var(--primary);
}
.preview-compare-btn {
  margin-left: auto;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 11px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  transition: all 0.2s;
}
.preview-compare-btn.active { border-color: var(--warn); color: var(--warn); background: var(--warn-dim); }

.previews-container {
  display: flex; gap: 8px;
}
.preview-box {
  flex: 1;
  height: 130px;
  background: #fff;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  overflow: hidden;
  position: relative;
  transition: border-color 0.3s;
}
.preview-box.target-box { border-color: rgba(16,185,129,0.4); }
.preview-box.live-box { border-color: rgba(56,189,248,0.4); }
.preview-box.match { border-color: var(--success); box-shadow: 0 0 16px rgba(16,185,129,0.3); }
.preview-box.mismatch { border-color: var(--error); }
.preview-label {
  position: absolute;
  top: 6px; left: 8px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  z-index: 10;
  padding: 2px 6px;
  border-radius: 4px;
}
.preview-label.target-lbl { background: rgba(16,185,129,0.9); color: #fff; }
.preview-label.live-lbl { background: rgba(56,189,248,0.9); color: #111; }
.preview-iframe, .preview-sandbox {
  width: 100%; height: 100%;
  border: none;
  transform-origin: top left;
}

/* Task Area */
.task-area {
  flex-shrink: 0;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.task-header { display: flex; align-items: flex-start; gap: 10px; }
.task-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--warn-dim);
  border: 1px solid rgba(251,191,36,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}
.task-content { flex: 1; }
.task-title { font-size: 11px; color: var(--primary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.task-desc { font-size: 14px; font-weight: 500; margin-top: 2px; line-height: 1.5; }
.task-hint {
  display: flex; align-items: flex-start; gap: 6px;
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(251,191,36,0.07);
  border: 1px solid rgba(251,191,36,0.15);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
}
.hint-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.hint-toggle {
  font-size: 11px;
  color: var(--warn);
  margin-top: 4px;
  display: inline-block;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
}
.hint-text { display: none; margin-top: 4px; color: var(--warn); }
.hint-text.visible { display: block; }

/* Editor Area */
.editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.editor-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.editor-label {
  font-family: var(--font-code);
  font-size: 11px;
  color: var(--text3);
  display: flex; align-items: center; gap: 6px;
}
.editor-actions { display: flex; gap: 6px; }
.editor-action-btn {
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px; font-weight: 600;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  transition: all 0.2s;
}
.editor-action-btn.primary {
  background: var(--primary);
  color: #0F172A;
  border-color: var(--primary);
}
.editor-action-btn.primary:hover { background: #7DD3FC; }
.editor-action-btn:not(.primary):hover { border-color: var(--border2); color: var(--text); }

/* Code Editor */
.code-editor-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #090f1c;
}
.code-lines {
  position: absolute;
  top: 0; left: 0;
  width: 44px; height: 100%;
  background: rgba(0,0,0,0.3);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding-top: 12px;
  pointer-events: none;
}
.code-line-num {
  height: 22px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 10px;
  font-family: var(--font-code);
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
}
.code-input {
  position: absolute;
  top: 0; left: 44px; right: 0; bottom: 0;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font-code);
  font-size: 13px;
  line-height: 22px;
  padding: 12px 16px;
  resize: none;
  caret-color: var(--primary);
  tab-size: 2;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
  overflow-y: auto;
  width: calc(100% - 44px);
}
/* Syntax highlight overlay — handled by JS */
.code-highlight {
  position: absolute;
  top: 0; left: 44px; right: 0; bottom: 0;
  pointer-events: none;
  font-family: var(--font-code);
  font-size: 13px;
  line-height: 22px;
  padding: 12px 16px;
  color: transparent;
  white-space: pre;
  overflow: hidden;
}

/* Autocomplete Dropdown — fixed so it's never clipped by overflow:hidden parents */
.autocomplete {
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(56,189,248,0.1);
  z-index: 400;
  min-width: 240px;
  max-width: 340px;
  max-height: 220px;
  overflow-y: auto;
  display: none;
}
.autocomplete.visible { display: block; }
.autocomplete-item {
  padding: 8px 12px;
  font-family: var(--font-code);
  font-size: 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  display: flex; align-items: center; gap: 8px;
  line-height: 1.4;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover, .autocomplete-item.selected { background: var(--primary-dim); }
.ac-prop { color: #7DD3FC; }
.ac-val { color: #86EFAC; }
.ac-desc { font-size: 10px; color: var(--text3); margin-left: auto; font-family: var(--font-body); }

/* Mobile Shortcut Bar */
.shortcut-bar {
  flex-shrink: 0;
  display: flex;
  gap: 4px;
  padding: 6px 10px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.shortcut-bar::-webkit-scrollbar { display: none; }
.shortcut-key {
  flex-shrink: 0;
  height: 32px;
  min-width: 36px;
  padding: 0 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--font-code);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.shortcut-key:active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); transform: scale(0.93); }

/* Submit / Feedback */
.submit-bar {
  flex-shrink: 0;
  padding: 10px 14px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.btn-submit {
  flex: 1;
  height: 44px;
  border-radius: var(--radius);
  background: var(--primary);
  color: #0F172A;
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-display);
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-submit:hover { background: #7DD3FC; }
.btn-submit:active { transform: scale(0.97); }
.btn-reset {
  width: 44px; height: 44px;
  border-radius: var(--radius);
  background: var(--bg2);
  border: 1px solid var(--border);
  font-size: 18px;
  transition: all 0.2s;
}
.btn-reset:hover { border-color: var(--error); }

/* Feedback Toast */
.feedback-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--bg2);
  border-top: 2px solid var(--border);
  padding: 14px 16px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index: 300;
}
.feedback-panel.visible { transform: translateY(0); }
.feedback-panel.success { border-top-color: var(--success); }
.feedback-panel.error { border-top-color: var(--error); }
.feedback-panel.warn { border-top-color: var(--warn); }
.feedback-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.feedback-icon { font-size: 22px; }
.feedback-title { font-size: 15px; font-weight: 700; }
.feedback-success .feedback-title { color: var(--success); }
.feedback-error .feedback-title { color: var(--error); }
.feedback-warn .feedback-title { color: var(--warn); }
.feedback-body { font-size: 13px; color: var(--text2); line-height: 1.6; }
.feedback-why {
  margin-top: 8px;
  padding: 8px 10px;
  background: var(--bg3);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
}
.feedback-why strong { color: var(--text); }
.feedback-confirm {
  margin-top: 10px;
  width: 100%;
  height: 44px;
  border-radius: 8px;
  font-size: 14px; font-weight: 700;
  background: var(--success);
  color: #fff;
  transition: all 0.2s;
  letter-spacing: 0.2px;
  font-family: var(--font-display);
}
.feedback-confirm:hover { background: #34D399; }
.feedback-confirm:active { transform: scale(0.97); }
.feedback-try {
  margin-top: 10px;
  width: 100%;
  height: 40px;
  border-radius: 8px;
  font-size: 13px; font-weight: 700;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  transition: all 0.2s;
}

/* Mode indicator */
.mode-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.mode-1 { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.mode-2 { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(56,189,248,0.3); }
.mode-3 { background: var(--warn-dim); color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }
.mode-4 { background: rgba(244,63,94,0.1); color: var(--error); border: 1px solid rgba(244,63,94,0.3); }

/* Choice Mode */
.choices-grid {
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.choice-btn {
  padding: 12px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-code);
  font-size: 12px;
  text-align: left;
  color: var(--text);
  transition: all 0.2s;
  line-height: 1.5;
}
.choice-btn:hover { border-color: var(--primary); background: var(--primary-dim); }
.choice-btn:active { transform: scale(0.97); }
.choice-btn.correct { border-color: var(--success); background: var(--success-dim); color: var(--success); }
.choice-btn.wrong { border-color: var(--error); background: var(--error-dim); color: var(--error); }

/* ═══════════════════════════════
   ANALYTICS SCREEN
═══════════════════════════════ */
#screen-analytics { overflow-y: auto; }
.analytics-content { padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.analytics-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.analytics-card-title {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}
/* Mini chart */
.chart-bars {
  display: flex; align-items: flex-end; gap: 6px;
  height: 80px;
}
.chart-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bar {
  width: 100%;
  background: linear-gradient(180deg, var(--primary), rgba(56,189,248,0.4));
  border-radius: 4px 4px 0 0;
  min-height: 4px;
  transition: all 0.5s;
}
.chart-bar-lbl { font-size: 9px; color: var(--text3); }
.error-breakdown { display: flex; flex-direction: column; gap: 6px; }
.error-row { display: flex; align-items: center; gap: 8px; }
.error-label { font-size: 12px; color: var(--text2); width: 120px; flex-shrink: 0; }
.error-bar-wrap { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.error-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: var(--error);
  transition: width 0.5s ease;
}
.error-count { font-size: 11px; color: var(--text3); width: 24px; text-align: right; }

/* ═══════════════════════════════
   LEVEL COMPLETE OVERLAY
═══════════════════════════════ */
.complete-overlay {
  position: fixed; inset: 0;
  background: rgba(9,15,28,0.92);
  backdrop-filter: blur(10px);
  z-index: 500;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.complete-overlay.visible { opacity: 1; pointer-events: all; }
.complete-card {
  background: var(--bg2);
  border: 1px solid rgba(56,189,248,0.3);
  border-radius: 24px;
  padding: 28px 24px;
  text-align: center;
  max-width: 340px;
  width: 100%;
  transform: scale(0.9) translateY(20px);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.complete-overlay.visible .complete-card { transform: scale(1) translateY(0); }
.complete-emoji { font-size: 64px; display: block; margin-bottom: 12px; animation: bounce 0.6s 0.3s ease both; }
@keyframes bounce { 0% { transform: scale(0.5); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
.complete-title {
  font-family: var(--font-display);
  font-size: 26px; font-weight: 800;
  background: linear-gradient(135deg, var(--success), var(--primary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}
.complete-sub { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.complete-stars { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.complete-star { font-size: 32px; opacity: 0; transition: all 0.3s; }
.complete-star.lit { opacity: 1; }
.complete-stats { display: flex; gap: 10px; margin-bottom: 20px; }
.cstat {
  flex: 1;
  background: var(--bg3);
  border-radius: 10px;
  padding: 10px;
  border: 1px solid var(--border);
}
.cstat-num { font-family: var(--font-display); font-size: 20px; font-weight: 800; line-height: 1.2; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
.cstat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }
.complete-btns { display: flex; gap: 8px; }
.btn-next-level {
  flex: 1;
  height: 44px;
  border-radius: 10px;
  background: var(--primary);
  color: #0F172A;
  font-size: 14px; font-weight: 700;
  font-family: var(--font-display);
  transition: all 0.2s;
}
.btn-next-level:hover { background: #7DD3FC; }
.btn-replay {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  font-size: 18px;
  transition: all 0.2s;
}
.btn-replay:hover { border-color: var(--primary); }

/* ═══════════════════════════════
   ROADMAP
═══════════════════════════════ */
/* Chapter tab strip */
.roadmap-tabs {
  display: flex;
  gap: 5px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 16px 8px;
}
.roadmap-tabs::-webkit-scrollbar { display: none; }
.roadmap-tab {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.roadmap-tab:hover { color: var(--text2); border-color: var(--border2); }
.roadmap-tab.active {
  background: var(--primary-dim);
  border-color: var(--primary);
  color: var(--primary);
}
.roadmap-tab.tab-done {
  border-color: rgba(16,185,129,0.35);
  color: var(--success);
}
.roadmap-tab.tab-done.active {
  background: var(--success-dim);
  border-color: var(--success);
}
.roadmap-tab.tab-preview {
  /* locked but viewable — slightly dimmed */
  opacity: 0.6;
}
.roadmap-tab.tab-preview:hover { opacity: 0.9; }
.roadmap-tab-icon { display: none; }
.roadmap-tab-badge { display: none; }
/* Level list */
.roadmap-levels {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.roadmap-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.roadmap-item:hover { border-color: var(--border2); transform: translateX(2px); }
.roadmap-item.rm-done { border-color: rgba(16,185,129,0.25); }
.roadmap-item.rm-current { border-color: var(--primary); background: var(--primary-dim); }
.roadmap-item.rm-locked { opacity: 0.4; cursor: default; }
.roadmap-item.rm-locked:hover { transform: none; }
.roadmap-dot {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  font-family: var(--font-display);
  font-weight: 700;
}
.rm-done    .roadmap-dot { background: var(--success-dim); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.rm-current .roadmap-dot { background: var(--primary); color: #0f172a; }
.rm-locked  .roadmap-dot { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
.rm-todo    .roadmap-dot { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.roadmap-info { flex: 1; min-width: 0; }
.roadmap-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.roadmap-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.roadmap-status-icon { font-size: 15px; }
/* Expand button */
.roadmap-more {
  margin-top: 6px;
}
.roadmap-more summary {
  font-size: 12px;
  color: var(--primary);
  cursor: pointer;
  padding: 8px 12px;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.roadmap-more summary::-webkit-details-marker { display: none; }
.roadmap-more[open] summary .rm-chevron { transform: rotate(90deg); }
.rm-chevron { display: inline-block; transition: transform 0.2s; font-style: normal; font-size: 10px; }
/* Chapter progress bar inside list */
.roadmap-ch-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 11px;
  color: var(--text2);
}
.roadmap-ch-bar {
  flex: 1;
  height: 4px;
  background: var(--bg3);
  border-radius: 99px;
  overflow: hidden;
}
.roadmap-ch-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #818CF8);
  border-radius: 99px;
  transition: width 0.4s ease;
}

/* ═══════════════════════════════
   BOTTOM NAV
═══════════════════════════════ */
.bottom-nav {
  flex-shrink: 0;
  height: 62px;
  display: flex;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  padding: 8px;
  border-radius: 10px;
  margin: 4px 2px;
  color: var(--text3);
  font-size: 10px;
  transition: all 0.2s;
}
.bottom-nav-btn.active { color: var(--primary); background: var(--primary-dim); }
.bottom-nav-btn:not(.active):hover { color: var(--text2); }
.bottom-nav-icon { font-size: 20px; line-height: 1; }

/* ═══════════════════════════════
   ANIMATIONS & UTILITIES
═══════════════════════════════ */
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(56,189,248,0.4); }
  100% { box-shadow: 0 0 0 10px rgba(56,189,248,0); }
}
.pulse { animation: pulse-ring 1.5s infinite; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
.shake { animation: shake 0.3s ease; }
@keyframes fade-up {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fade-up 0.3s ease forwards; }
.hidden { display: none !important; }

/* Desktop adjustments */
@media (min-width: 600px) {
  #screen-game {
    max-width: 800px;
    margin: 0 auto;
  }
  .preview-box { height: 180px; }
  .game-body { flex-direction: row; flex-wrap: wrap; }
  .preview-area { flex: 1; min-width: 300px; }
  .task-area { flex: 1; min-width: 300px; }
  .editor-area { width: 100%; }
}

@media (min-width: 900px) {
  #screen-game { max-width: 1000px; }
  .game-body { flex-direction: row; }
  .game-left { width: 45%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .game-right { flex: 1; display: flex; flex-direction: column; }
}

/* Tablet */
@media (min-width: 600px) {
  .level-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .stats-row { grid-template-columns: repeat(4, 1fr); }
}

/* Focus states */
.code-input:focus { outline: none; }
button:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════ HOME SCREEN ══════════════ -->
  <div id="screen-home" class="screen active">
    <div class="nav">
      <div class="nav-logo">CSS Quest<span>Beta</span></div>
      <div class="nav-actions">
        <button class="nav-btn" onclick="showScreen('analytics')" title="學習分析">📊</button>
        <button class="nav-btn" title="設定">⚙️</button>
      </div>
    </div>
    <div id="home-scroll" style="flex:1;overflow-y:auto;padding-bottom:16px;">
      <div class="home-hero">
        <div class="hero-greeting">👋 歡迎回來</div>
        <h1 class="hero-title">今天要挑戰<br>哪個關卡？</h1>
        <p class="hero-sub">用玩遊戲的方式學 CSS，從完全看不懂到能自己寫出來。</p>
      </div>

      <!-- Streak -->
      <div class="streak-card">
        <div class="streak-icon">🔥</div>
        <div class="streak-info">
          <div class="streak-num" id="streak-num">3</div>
          <div class="streak-label">連續學習天數</div>
          <div class="streak-days" id="streak-days"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" style="color:var(--primary)" id="stat-done">0</div>
          <div class="stat-lbl">完成關卡</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--success)" id="stat-acc">—</div>
          <div class="stat-lbl">正確率</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--warn)" id="stat-time">0</div>
          <div class="stat-lbl">今日練習</div>
        </div>
      </div>

      <!-- Continue -->
      <div class="section-header" style="padding-top:4px;">
        <div class="section-title">繼續學習</div>
      </div>
      <div class="continue-card" id="continue-card" onclick="continuePlay()">
        <div class="continue-top">
          <div class="continue-icon" id="continue-icon">📝</div>
          <div class="continue-meta">
            <div class="continue-chapter" id="continue-chapter">第一章</div>
            <div class="continue-name" id="continue-name">CSS 基礎</div>
          </div>
          <div class="continue-badge" id="continue-badge">進行中</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="continue-progress" style="width:0%"></div></div>
        <div class="progress-label"><span id="continue-done">0</span><span id="continue-pct">0%</span></div>
      </div>

      <!-- Learning Roadmap -->
      <div class="section-header" style="margin-top:4px;">
        <div class="section-title">📍 學習進度</div>
      </div>
      <!-- Chapter tab strip -->
      <div class="roadmap-tabs" id="roadmap-tabs"></div>
      <!-- Level list for selected chapter -->
      <div id="roadmap-wrap" style="padding:0 16px 16px;"></div>

      <!-- Weakness -->
      <div class="section-header">
        <div class="section-title">⚠️ 弱點分析</div>
        <button class="section-link" onclick="showScreen('analytics')">查看全部</button>
      </div>
      <div class="weakness-panel">
        <div style="font-size:12px;color:var(--text2);line-height:1.5;">根據你的練習紀錄，這些觀念需要加強：</div>
        <div class="weakness-items" id="weakness-list"></div>
      </div>

      <!-- Chapters -->
      <div class="section-header" style="margin-top:8px;">
        <div class="section-title">學習章節</div>
      </div>
      <div class="chapter-list" id="chapter-list"></div>

      <!-- Badges -->
      <div class="section-header" style="margin-top:16px;">
        <div class="section-title">🏆 成就徽章</div>
      </div>
      <div class="badges-scroll" id="badges-row"></div>
    </div>
  </div>

  <!-- ══════════════ CHAPTER SCREEN ══════════════ -->
  <div id="screen-chapter" class="screen">
    <div class="nav">
      <button class="nav-back" onclick="showScreen('home')">← 返回</button>
      <div class="nav-logo" id="chapter-nav-title">第一章</div>
      <div></div>
    </div>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <!-- ══════════════ GAME SCREEN ══════════════ -->
  <div id="screen-game" class="screen">
    <div class="game-nav">
      <button class="nav-back" onclick="confirmLeave()" style="padding:6px 8px;font-size:12px;">← 退出</button>
      <div class="game-progress-wrap">
        <div class="game-level-label">
          <span id="game-level-label">關卡 1</span>
          <span id="game-mode-badge"></span>

// ─── User Data — default blank state, persisted per-browser via localStorage ───
const DEFAULT_CHAPTER_STATUS = { 0: 'active' };

function buildFreshUserData() {
  return {
    completedLevels: new Set(),
    currentChapter: 0,
    currentLevelId: '0-1',
    streak: 0,
    lastPlayedDate: null,
    totalXP: 0,
    sessionsToday: 0,
    sessionDate: null,
    errors: {},
    totalAttempts: 0,
    totalCorrect: 0,
    chapterStatus: Object.assign({}, DEFAULT_CHAPTER_STATUS),
    badges: [],
  };
}

function loadUserData() {
  try {
    const raw = localStorage.getItem('cssquest_v1');
    if (!raw) return buildFreshUserData();
    const parsed = JSON.parse(raw);
    parsed.completedLevels = new Set(parsed.completedLevels || []);
    parsed.errors        = parsed.errors || {};
    parsed.chapterStatus = parsed.chapterStatus || Object.assign({}, DEFAULT_CHAPTER_STATUS);
    parsed.badges        = parsed.badges || [];
    parsed.totalAttempts = parsed.totalAttempts || 0;
    parsed.totalCorrect  = parsed.totalCorrect  || 0;
    const today     = new Date().toDateString();
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (parsed.sessionDate !== today) { parsed.sessionsToday = 0; parsed.sessionDate = today; }
    if (parsed.lastPlayedDate && parsed.lastPlayedDate !== today && parsed.lastPlayedDate !== yesterday) {
      parsed.streak = 0;
    }
    return parsed;
  } catch(e) { return buildFreshUserData(); }
}

function saveUserData() {
  try {
    const toSave = Object.assign({}, userData);
    toSave.completedLevels = [...userData.completedLevels];
    localStorage.setItem('cssquest_v1', JSON.stringify(toSave));
  } catch(e) {}
}

function recordVisit() {
  // Called once on app load — updates streak & session date
  const today     = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (userData.sessionDate !== today) {
    userData.sessionsToday = 0;
    userData.sessionDate = today;
  }
  if (userData.lastPlayedDate !== today) {
    userData.streak = (userData.lastPlayedDate === yesterday)
      ? (userData.streak + 1) : 1;
    userData.lastPlayedDate = today;
  }
  saveUserData();
}

function recordPlaySession() {
  // Called when a level is completed — increments today's session count
  const today = new Date().toDateString();
  if (userData.sessionDate !== today) { userData.sessionsToday = 0; userData.sessionDate = today; }
  userData.sessionsToday += 1;
  saveUserData();
}

function computeAccuracy() {
  if (!userData.totalAttempts) return null;
  return Math.round((userData.totalCorrect / userData.totalAttempts) * 100);
}

function getChapterStatus(chId) {
  if (userData.chapterStatus[chId] !== undefined) return userData.chapterStatus[chId];
  return chId === 0 ? 'active' : 'locked';
}

function computeWeaknesses() {
  const errs = userData.errors || {};
  const sorted = Object.entries(errs).sort((a,b) => b[1]-a[1]);
  const MAP = {
    semicolon: { icon:'⚠️', text:'常漏掉分號 (;)',          key:'semicolon' },
    spacing:   { icon:'⚠️', text:'padding / margin 常混淆', key:'spacing'   },
    property:  { icon:'⚠️', text:'屬性名稱錯誤',            key:'property'  },
    flex:      { icon:'⚠️', text:'Flex 對齊觀念不熟',       key:'flex'      },
    selector:  { icon:'⚠️', text:'選取器語法需加強',        key:'selector'  },
  };
  return sorted.slice(0, 3).map(([key]) => MAP[key] || { icon:'⚠️', text:key, key });
}

function recordError(type) {
  userData.errors[type] = (userData.errors[type] || 0) + 1;
  saveUserData();
}
