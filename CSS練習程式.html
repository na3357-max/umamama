  }).join('');

  // Badges — earned state from real userData
  document.getElementById('badges-row').innerHTML = BADGES.map(b =>
    `<div class="badge-card ${userData.badges.includes(b.id) ? 'earned' : 'locked-badge'}" title="${b.desc}">
      <span class="badge-emoji">${b.emoji}</span>
      <div class="badge-name">${b.name}</div>
    </div>`
  ).join('');

  renderContinueCard();
  renderRoadmap();
}

// Track which chapter tab is selected in the roadmap
let roadmapSelectedChapter = -1; // -1 = auto (active chapter)

function openActiveChapter() {
  let activeChId = 0;
  for (let i = CHAPTERS.length - 1; i >= 0; i--) {
    const st = getChapterStatus(CHAPTERS[i].id);
    if (st === 'active') { activeChId = CHAPTERS[i].id; break; }
  }
  openChapter(activeChId);
}

function renderRoadmap() {
  // Determine which chapter to show
  if (roadmapSelectedChapter === -1) {
    // Auto-select: find the active chapter
    roadmapSelectedChapter = 0;
    for (let i = CHAPTERS.length - 1; i >= 0; i--) {
      if (getChapterStatus(CHAPTERS[i].id) === 'active') {
        roadmapSelectedChapter = CHAPTERS[i].id;
        break;
      }
    }
  }
  renderRoadmapTabs();
  renderRoadmapLevels(roadmapSelectedChapter);
}

function selectRoadmapChapter(chId) {
  roadmapSelectedChapter = chId;
  renderRoadmapTabs();
  renderRoadmapLevels(chId);
}

function renderRoadmapTabs() {
  const tabsEl = document.getElementById('roadmap-tabs');
  if (!tabsEl) return;

  tabsEl.innerHTML = CHAPTERS.map(ch => {
    const status   = getChapterStatus(ch.id);
    const isActive = ch.id === roadmapSelectedChapter;
    const isDone   = status === 'done';
    const isLocked = status === 'locked';

    let tabCls = 'roadmap-tab';
    if (isActive)    tabCls += isDone ? ' tab-done active' : ' active';
    else if (isDone) tabCls += ' tab-done';
    else if (isLocked) tabCls += ' tab-preview'; // locked but clickable to preview

    // All chapters are clickable — locked ones show preview (no play)
    return `<button class="${tabCls}" onclick="selectRoadmapChapter(${ch.id})">第${ch.id + 1}章</button>`;
  }).join('');

  // Scroll active tab into view
  const activeTab = tabsEl.querySelector('.roadmap-tab.active');
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function renderRoadmapLevels(chId) {
  const wrap = document.getElementById('roadmap-wrap');
  if (!wrap) return;

  const ch     = CHAPTERS[chId];
  const allLvs = ALL_LEVELS.filter(l => l.chapter === chId);
  const doneN  = allLvs.filter(l => userData.completedLevels.has(l.id)).length;
  const pct    = allLvs.length ? Math.round(doneN / allLvs.length * 100) : 0;
  const status = getChapterStatus(chId);

  const SHOW_INLINE = 5;
  const inline = allLvs.slice(0, SHOW_INLINE);
  const extra  = allLvs.slice(SHOW_INLINE);

  function lvState(lv) {
    if (userData.completedLevels.has(lv.id)) return 'rm-done';
    if (isLevelUnlocked(lv)) {
      const prevDone = lv.num === 1 || userData.completedLevels.has(
        ALL_LEVELS.find(l2 => l2.chapter === lv.chapter && l2.num === lv.num - 1)?.id
      );
      return prevDone ? 'rm-current' : 'rm-todo';
    }
    return 'rm-locked';
  }

  function diffDots(diff) {
    return [0,1,2].map(i =>
      `<span style="color:${i < diff ? 'var(--primary)' : 'var(--border2)'}">●</span>`
    ).join('');
  }

  function buildItem(lv) {
    const state = lvState(lv);
    const onclick = state !== 'rm-locked' ? `startLevel('${lv.id}')` : '';
    const dotLabel = state === 'rm-done' ? '✓' : state === 'rm-locked' ? '🔒' : lv.num;
    const statusLabel = state === 'rm-done' ? '已完成' : state === 'rm-current' ? '👉 建議練習' : state === 'rm-locked' ? '尚未解鎖' : '待挑戰';
    const statusIcon  = state === 'rm-done' ? '✅' : state === 'rm-current' ? '⚡' : state === 'rm-locked' ? '' : '○';
    return `<div class="roadmap-item ${state}" onclick="${onclick}">
      <div class="roadmap-dot">${dotLabel}</div>
      <div class="roadmap-info">
        <div class="roadmap-name">關卡 ${lv.num}&ensp;${lv.icon} ${lv.title}</div>
        <div class="roadmap-meta">${diffDots(lv.diff)}&ensp;${statusLabel}</div>
      </div>
      <span class="roadmap-status-icon">${statusIcon}</span>
    </div>`;
  }

  // Chapter header with progress
  let html = `<div class="roadmap-ch-progress">
    <span>${ch.icon} 第${chId+1}章 ${ch.name}</span>
    <div class="roadmap-ch-bar"><div class="roadmap-ch-fill" style="width:${pct}%"></div></div>
    <span style="flex-shrink:0">${doneN}/${allLvs.length}</span>
  </div>`;

  // Even locked chapters can be previewed (but items are all rm-locked / no click)
  // So we don't return early — we fall through to render the level list.

  html += '<div class="roadmap-levels">';
  inline.forEach(lv => { html += buildItem(lv); });
  html += '</div>';

  if (extra.length > 0) {
    html += `<details class="roadmap-more">
      <summary><i class="rm-chevron">▶</i>&ensp;還有 ${extra.length} 個關卡</summary>
      <div class="roadmap-levels" style="margin-top:8px;">`;
    extra.forEach(lv => { html += buildItem(lv); });
    html += '</div></details>';
  }

  wrap.innerHTML = html;
}

function renderContinueCard() {
  // Find the current active chapter and progress
  let activeChId = 0;
  for (let i = CHAPTERS.length - 1; i >= 0; i--) {
    const st = getChapterStatus(CHAPTERS[i].id);
    if (st === 'active' || st === 'done') { activeChId = CHAPTERS[i].id; break; }
  }
  const ch = CHAPTERS[activeChId];
  const chLevels = ALL_LEVELS.filter(l => l.chapter === activeChId);
  const doneCnt = chLevels.filter(l => userData.completedLevels.has(l.id)).length;
  const pct = chLevels.length ? Math.round((doneCnt / chLevels.length) * 100) : 0;
  document.getElementById('continue-icon').textContent = ch.icon;
  document.getElementById('continue-chapter').textContent = '第' + (activeChId+1) + '章';
  document.getElementById('continue-name').textContent = ch.name;
  document.getElementById('continue-badge').textContent = pct === 100 ? '✅ 完成' : '進行中';
  document.getElementById('continue-progress').style.width = pct + '%';
  document.getElementById('continue-done').textContent = doneCnt + ' / ' + chLevels.length + ' 關';
  document.getElementById('continue-pct').textContent = pct + '%';
}

function continuePlay() {
  // Find the first incomplete level in the active chapter
  let activeChId = 0;
  for (let i = CHAPTERS.length - 1; i >= 0; i--) {
    const st = getChapterStatus(CHAPTERS[i].id);
    if (st === 'active') { activeChId = CHAPTERS[i].id; break; }
  }
  const chLevels = ALL_LEVELS.filter(l => l.chapter === activeChId);
  const nextLevel = chLevels.find(l => !userData.completedLevels.has(l.id) && isLevelUnlocked(l));
  if (nextLevel) {
    startLevel(nextLevel.id);
  } else {
    openChapter(activeChId);
  }
}

function openChapter(chapterId) {
  const ch = CHAPTERS[chapterId];
  if(!ch || ch.status === 'locked') return;
  document.getElementById('chapter-nav-title').textContent = `${ch.num} ${ch.name}`;
  renderLevelGrid(chapterId);
  showScreen('chapter');
  document.getElementById('bnav-learn').classList.add('active');
}

function renderLevelGrid(chapterId) {
  const levels = ALL_LEVELS.filter(l => l.chapter === chapterId);
  document.getElementById('level-grid').innerHTML = levels.map(lv => {
    const done = userData.completedLevels.has(lv.id);
    const locked = !done && !isLevelUnlocked(lv);
    const dots = Array.from({length:3}, (_,i) => `<div class="diff-dot ${i < lv.diff ? 'filled' : ''}"></div>`).join('');
    return `<div class="level-card ${done ? 'done' : ''} ${locked ? 'locked-card' : ''}"
      onclick="${locked ? '' : `startLevel('${lv.id}')`}">
      <div class="level-num">關卡 ${lv.num}</div>
      <div class="level-title">${lv.icon} ${lv.title}</div>
      <div class="level-meta">
        <div class="level-diff">${dots}</div>
        <span class="level-status">${done ? '✅' : locked ? '🔒' : '▶️'}</span>
      </div>
    </div>`;
  }).join('');
}

function isLevelUnlocked(lv) {
  if(lv.chapter === 0 && lv.num === 1) return true;
  // previous level done
  const prev = ALL_LEVELS.find(l => l.chapter === lv.chapter && l.num === lv.num - 1);
  if(prev && userData.completedLevels.has(prev.id)) return true;
  if(lv.num === 1) {
    // first level of chapter — need previous chapter's first level done
    const prevChLevel = ALL_LEVELS.find(l => l.chapter === lv.chapter - 1 && l.num === 1);
    if(prevChLevel && userData.completedLevels.has(prevChLevel.id)) return true;
  }
  return userData.completedLevels.has(lv.id);
}

function drillWeakness(key) {
  // Find first relevant level
  const map = { flex: '4-1', semicolon: '0-1', spacing: '2-1' };
  const lvId = map[key] || '0-1';
  const lv = ALL_LEVELS.find(l => l.id === lvId);
  if(lv) startLevel(lv.id);
}

function scrollToBadges() {
  showScreen('home');
  setTimeout(() => {
    document.getElementById('badges-row').scrollIntoView({ behavior: 'smooth' });
  }, 100);
}

/* ═══════════════════════════════════════════════════
   GAME ENGINE
═══════════════════════════════════════════════════ */
function startLevel(levelId) {
  const lv = ALL_LEVELS.find(l => l.id === levelId);
  if(!lv) return;
  gameState.level = lv;
  gameState.lives = 3;
  gameState.tries = 0;
  gameState.startTime = Date.now();
  gameState.feedbackVisible = false;
  gameState.previewMode = 'compare';
  gameState.levelIndex = ALL_LEVELS.indexOf(lv);

  showScreen('game');
  setupGameUI();
}

function setupGameUI() {
  const lv = gameState.level;

  // Nav
  document.getElementById('game-level-label').textContent = `第${lv.chapter+1}章 · 關卡 ${lv.num}`;
  document.getElementById('game-mode-badge').innerHTML = getModeLabel(lv.mode);

  // Progress
  const chLevels = ALL_LEVELS.filter(l => l.chapter === lv.chapter);
  const pct = ((lv.num - 1) / chLevels.length) * 100;
  document.getElementById('game-progress-bar').style.width = pct + '%';

  // Lives
  renderLives();

  // Task
  document.getElementById('task-icon').textContent = lv.icon;
  document.getElementById('task-desc').textContent = lv.desc;
  document.getElementById('hint-text').textContent = lv.designerHint || lv.hint;
  document.getElementById('hint-text').classList.remove('visible');
  document.querySelector('.hint-toggle').textContent = '顯示提示';

  // Previews
  renderPreviews();
  setPreviewMode('compare');

  // Feedback panel
  document.getElementById('feedback-panel').classList.remove('visible');

  // Reset submit button, confirm button & preview state from previous level
  const submitBtn = document.getElementById('btn-submit');
  if (submitBtn) submitBtn.disabled = false;
  document.getElementById('feedback-confirm').classList.add('hidden');
  document.getElementById('feedback-try').classList.add('hidden');
  document.getElementById('live-preview').classList.remove('match', 'mismatch');
  document.getElementById('complete-overlay').classList.remove('visible');

  // Mode setup
  if(lv.mode === 1) {
    // Choice mode
    document.getElementById('choices-mode').classList.remove('hidden');
    document.getElementById('editor-mode').classList.add('hidden');
    document.getElementById('submit-bar').classList.add('hidden');
    renderChoices();
  } else {
    // Editor mode
    document.getElementById('choices-mode').classList.add('hidden');
    document.getElementById('editor-mode').classList.remove('hidden');
    document.getElementById('submit-bar').classList.remove('hidden');
    const inp = document.getElementById('code-input');
    inp.value = lv.baseCSS || '';
    updateLineNumbers();
    updateLivePreview();
  }

  // Shortcuts
  renderShortcuts();
}

function getModeLabel(mode) {
  const labels = ['','<span class="mode-badge mode-1">選擇題</span>','<span class="mode-badge mode-2">填入模式</span>','<span class="mode-badge mode-3">提示模式</span>','<span class="mode-badge mode-4">自由模式</span>'];
  return labels[mode] || '';
}

function renderLives() {
  const el = document.getElementById('game-lives');
  el.innerHTML = Array.from({length: 3}, (_,i) =>
    `<span class="life-icon ${i >= gameState.lives ? 'lost' : ''}">❤️</span>`
  ).join('');
}

/* ───── Preview ───── */
function getPreviewHTML(style, lv) {
  const html = lv.htmlTemplate.replace(/STYLE_INJECT/g, style || '');
  return `<!DOCTYPE html><html><head><style>*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif;}body{height:100vh;overflow:hidden;}</style></head><body>${html}</body></html>`;
}

function renderPreviews() {
  const lv = gameState.level;
  const targetFrame = document.getElementById('target-iframe');
  const liveFrame = document.getElementById('live-iframe');
  targetFrame.srcdoc = getPreviewHTML(lv.targetStyle, lv);
  liveFrame.srcdoc = getPreviewHTML(lv.baseStyle, lv);
}

function updateLivePreview() {
  const lv = gameState.level;
  const css = document.getElementById('code-input').value;
  // Extract style from textarea (simplified — extract inline styles from properties)
  const liveStyle = extractInlineStyle(css, lv);
  const liveFrame = document.getElementById('live-iframe');
  liveFrame.srcdoc = getPreviewHTML(liveStyle, lv);
}

function extractInlineStyle(cssText, lv) {
  // Parse simple CSS and extract properties as inline style
  const props = {};
  const baseProps = parseInlineStyle(lv.baseStyle);
  Object.assign(props, baseProps);
  // Parse the editor CSS
  const matches = cssText.match(/\{([^}]*)\}/);
  if(matches) {
    const inner = matches[1];
    const lines = inner.split(';');
    lines.forEach(line => {
      const [k, v] = line.split(':').map(s => s.trim());
      if(k && v) props[k] = v;
    });
  } else {
    // No braces — treat the whole thing as inline
    const lines = cssText.split(';');
    lines.forEach(line => {
      const [k, v] = line.split(':').map(s => s.trim());
      if(k && v) props[k] = v;
    });
  }
  return Object.entries(props).map(([k,v]) => `${k}:${v}`).join(';');
}

function parseInlineStyle(str) {
  const obj = {};
  str.split(';').forEach(p => {
    const [k, v] = p.split(':').map(s => s.trim());
    if(k && v) obj[k] = v;
  });
  return obj;
}

function setPreviewMode(mode) {
  gameState.previewMode = mode;
  ['compare','target','live'].forEach(m => {
    document.getElementById('tab-'+m).classList.toggle('active', m === mode);
  });
  const t = document.getElementById('target-preview');
  const l = document.getElementById('live-preview');
  if(mode === 'compare') {
    t.style.display = ''; l.style.display = '';
  } else if(mode === 'target') {
    t.style.display = ''; l.style.display = 'none';
    t.style.flex = '1';
  } else {
    t.style.display = 'none'; l.style.display = '';
    l.style.flex = '1';
  }
}

function toggleOverlay() {
  gameState.overlayActive = !gameState.overlayActive;
  document.getElementById('overlay-btn').classList.toggle('active', gameState.overlayActive);
  // simple visual effect on live preview
  const liveBox = document.getElementById('live-preview');
  liveBox.style.opacity = gameState.overlayActive ? '0.65' : '1';
}

/* ───── Choice Mode ───── */
function renderChoices() {
  const lv = gameState.level;
  const grid = document.getElementById('choices-grid');
  // Shuffle choices
  const shuffled = [...lv.choices].sort(() => Math.random() - 0.5);
  grid.innerHTML = shuffled.map((c, i) =>
    `<button class="choice-btn" onclick="selectChoice(${i})" id="choice-${i}">${c.text}</button>`
  ).join('');
  // Store shuffled
  gameState.shuffledChoices = shuffled;
}

function selectChoice(idx) {
  const choice = gameState.shuffledChoices[idx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  userData.totalAttempts++;
  if(choice.correct) {
    userData.totalCorrect++;
    document.getElementById('choice-'+idx).classList.add('correct');
    userData.completedLevels.add(gameState.level.id);
    checkAndAwardBadges();
    saveUserData();
    showFeedback('success', '答對了！✨', choice.why || gameState.level.successMsg, gameState.level.successWhy);
    const lv = gameState.level;
    document.getElementById('live-iframe').srcdoc = getPreviewHTML(lv.targetStyle, lv);
    document.getElementById('live-preview').classList.add('match');
    document.getElementById('feedback-confirm').classList.remove('hidden');
  } else {
    document.getElementById('choice-'+idx).classList.add('wrong');
    gameState.lives = Math.max(0, gameState.lives - 1);
    renderLives();
    gameState.tries++;
    recordError('property');
    const lv = gameState.level;
    showFeedback('error', '不太對喔', choice.why || '試試其他選項吧！', null);
    // Shake
    document.getElementById('choices-grid').classList.add('shake');
    setTimeout(() => document.getElementById('choices-grid').classList.remove('shake'), 400);
    // Re-enable after delay
    setTimeout(() => {
      btns.forEach(b => { b.disabled = false; b.classList.remove('wrong'); });
      closeFeedback();
    }, 1800);
  }
}

/* ───── Editor Mode ───── */
function onCodeInput() {
  updateLineNumbers();
  updateLivePreview();
  showAutocomplete();
}

function updateLineNumbers() {
  const inp = document.getElementById('code-input');
  const lines = inp.value.split('\n');
  const container = document.getElementById('code-lines');
  container.innerHTML = lines.map((_, i) =>
    `<div class="code-line-num">${i+1}</div>`
  ).join('');
}

function onCodeKeydown(e) {
  const inp = document.getElementById('code-input');
  const ac = document.getElementById('autocomplete');

  if(ac.classList.contains('visible')) {
    if(e.key === 'ArrowDown') {
      e.preventDefault();
      gameState.acSelected = Math.min(gameState.acSelected+1, gameState.acItems.length-1);
      highlightAC();
    } else if(e.key === 'ArrowUp') {
      e.preventDefault();
      gameState.acSelected = Math.max(gameState.acSelected-1, 0);
      highlightAC();
    } else if(e.key === 'Enter' || e.key === 'Tab') {
      e.preventDefault();
      applyAutocomplete(gameState.acSelected);
    } else if(e.key === 'Escape') {
      hideAutocomplete();
    }
    return;
  }

  // Tab = indent
  if(e.key === 'Tab') {
    e.preventDefault();
    const start = inp.selectionStart;
    const end = inp.selectionEnd;
    inp.value = inp.value.substring(0, start) + '  ' + inp.value.substring(end);
    inp.selectionStart = inp.selectionEnd = start + 2;
    onCodeInput();
  }
  // Enter = auto-indent
  if(e.key === 'Enter') {
    const start = inp.selectionStart;
    const before = inp.value.substring(0, start);
    const lastLine = before.split('\n').pop();
    const indent = lastLine.match(/^(\s*)/)[1];
    const extra = before.endsWith('{') ? '  ' : '';
    setTimeout(() => {
      const newStart = inp.selectionStart;
      inp.value = inp.value.substring(0, newStart) + indent + extra + inp.value.substring(newStart);
      inp.selectionStart = inp.selectionEnd = newStart + indent.length + extra.length;
      onCodeInput();
    }, 0);
  }
}

function syncScroll() {
  const inp = document.getElementById('code-input');
  document.getElementById('code-lines').style.transform = `translateY(-${inp.scrollTop}px)`;
  // Reposition the autocomplete if it's open
  const ac = document.getElementById('autocomplete');
  if (ac.classList.contains('visible')) showAutocomplete();
}

/* ───── Autocomplete ───── */
function showAutocomplete() {
  const inp = document.getElementById('code-input');
  const pos = inp.selectionStart;
  const before = inp.value.substring(0, pos);
  const lastLine = before.split('\n').pop();
  const trimmed = lastLine.trim();
  if(!trimmed || trimmed.length < 1) { hideAutocomplete(); return; }

  const items = CSS_COMPLETIONS.filter(c =>
    c.prop.startsWith(trimmed) || c.full.toLowerCase().includes(trimmed.toLowerCase())
  ).slice(0, 6);

  if(!items.length) { hideAutocomplete(); return; }
  gameState.acItems = items;
  gameState.acSelected = 0;

  const ac = document.getElementById('autocomplete');
  ac.innerHTML = items.map((item, i) =>
    `<div class="autocomplete-item ${i===0?'selected':''}" onclick="applyAutocomplete(${i})">
      <span><span class="ac-prop">${item.prop}</span>: <span class="ac-val">${item.val}</span>;</span>
      <span class="ac-desc">${item.desc}</span>
    </div>`
  ).join('');

  // ── Smart positioning (fixed, so never clipped) ──────────────────
  const LINE_H = 22;   // matches CSS line-height of .code-input
  const PAD_T  = 12;   // padding-top of .code-input

  const inputRect = inp.getBoundingClientRect();

  // Which visual line is the cursor on? (0-based, accounting for scroll)
  const linesBefore   = inp.value.substring(0, inp.selectionStart).split('\n');
  const cursorLineIdx = linesBefore.length - 1;
  const cursorTopInInput  = PAD_T + cursorLineIdx * LINE_H - inp.scrollTop;

  // Clamp so cursor position stays within the visible textarea area
  const clampedTop = Math.max(0, Math.min(cursorTopInInput, inputRect.height - LINE_H));

  // Screen-space positions
  const cursorScreenTop    = inputRect.top  + clampedTop;
  const cursorScreenBottom = cursorScreenTop + LINE_H;
  const cursorScreenLeft   = inputRect.left + 44 + 16; // gutter(44) + left padding(16)

  // Estimate dropdown height
  const acHeight = Math.min(gameState.acItems.length, 6) * 38 + 8;
  const spaceBelow = window.innerHeight - cursorScreenBottom - 8;
  const spaceAbove = cursorScreenTop - 8;

  ac.style.left   = Math.min(cursorScreenLeft, window.innerWidth - 256) + 'px';
  ac.style.right  = 'auto';
  ac.style.maxHeight = Math.min(acHeight, 220) + 'px';

  if (spaceBelow >= acHeight || spaceBelow >= spaceAbove) {
    // Open downward
    ac.style.top    = cursorScreenBottom + 4 + 'px';
    ac.style.bottom = 'auto';
  } else {
    // Open upward
    ac.style.bottom = window.innerHeight - cursorScreenTop + 4 + 'px';
    ac.style.top    = 'auto';
  }

  ac.classList.add('visible');
}

function highlightAC() {
  document.querySelectorAll('.autocomplete-item').forEach((el, i) => {
    el.classList.toggle('selected', i === gameState.acSelected);
  });
}

function applyAutocomplete(idx) {
  const item = gameState.acItems[idx];
  if(!item) return;
  const inp = document.getElementById('code-input');
  const pos = inp.selectionStart;
  const before = inp.value.substring(0, pos);
  const after = inp.value.substring(pos);
  const lines = before.split('\n');
  const lastLine = lines[lines.length - 1];
  const trimmed = lastLine.trim();
  const indent = lastLine.match(/^(\s*)/)[1];
  lines[lines.length - 1] = indent + item.full;
  inp.value = lines.join('\n') + after;
  inp.selectionStart = inp.selectionEnd = lines.join('\n').length;
  hideAutocomplete();
  onCodeInput();
}

function hideAutocomplete() {
  document.getElementById('autocomplete').classList.remove('visible');
}

/* ───── Shortcuts ───── */
function renderShortcuts() {
  document.getElementById('shortcut-bar').innerHTML = SHORTCUTS.map(k =>
    `<button class="shortcut-key" onclick="insertShortcut('${k}')">${k}</button>`
  ).join('');
}

function insertShortcut(char) {
  const inp = document.getElementById('code-input');
  const start = inp.selectionStart;
  const end = inp.selectionEnd;
  inp.value = inp.value.substring(0, start) + char + inp.value.substring(end);
  inp.selectionStart = inp.selectionEnd = start + char.length;
  inp.focus();
  onCodeInput();
}

/* ───── Submit ───── */
function submitAnswer() {
  const lv = gameState.level;
  const css = document.getElementById('code-input').value;
  gameState.tries++;

  let correct = false;
  if(lv.validate) {
    correct = lv.validate(css);
  } else {
    // Default: check target CSS properties exist
    correct = checkCSSSimilarity(css, lv.targetCSS);
  }

  userData.totalAttempts++;
  if(correct) {
    userData.totalCorrect++;
    userData.completedLevels.add(lv.id);
    checkAndAwardBadges();
    document.getElementById('live-preview').classList.add('match');
    document.getElementById('live-iframe').srcdoc = getPreviewHTML(lv.targetStyle, lv);
    showFeedback('success', '答對了！🎉', lv.successMsg, lv.successWhy);
    document.getElementById('feedback-confirm').classList.remove('hidden');
    document.getElementById('feedback-try').classList.add('hidden');
    document.getElementById('btn-submit').disabled = true;
    saveUserData();
  } else {
    gameState.lives = Math.max(0, gameState.lives - 1);
    renderLives();
    const errorMsg = getErrorMessage(css, lv);
    // Record error type
    const errType = detectErrorType(css, lv);
    recordError(errType);
    showFeedback('error', '還差一點 😅', errorMsg, null);
    document.getElementById('feedback-next').classList.add('hidden');
    document.getElementById('feedback-try').classList.remove('hidden');
    document.getElementById('code-input').classList.add('shake');
    setTimeout(() => document.getElementById('code-input').classList.remove('shake'), 400);
  }
}

function checkCSSSimilarity(userCSS, targetCSS) {
  // Extract key properties from target
  const targetProps = {};
  const tMatches = targetCSS.match(/([a-z-]+)\s*:\s*([^;]+);/g) || [];
  tMatches.forEach(m => {
    const [k,v] = m.replace(';','').split(':').map(s=>s.trim());
    if(k) targetProps[k] = v;
  });

  const userProps = {};
  const uMatches = userCSS.match(/([a-z-]+)\s*:\s*([^;]+);/g) || [];
  uMatches.forEach(m => {
    const [k,v] = m.replace(';','').split(':').map(s=>s.trim());
    if(k) userProps[k] = v;
  });

  // Check if all target props are in user
  const keys = Object.keys(targetProps);
  if(!keys.length) return false;
  return keys.every(k => userProps[k] !== undefined);
}

function getErrorMessage(css, lv) {
  if(!css.includes(';')) return '記得每行 CSS 結尾都要加分號 ; 喔！就像句點一樣。';
  if(css.includes('margin') && lv.targetCSS.includes('padding')) return 'margin 是元件外面的距離，現在需要的是裡面的距離（padding）。';
  if(css.includes('padding') && lv.targetCSS.includes('margin')) return 'padding 是元件裡面的距離，現在需要的是外面的距離（margin）。';
  if(css.includes('font-size') && lv.targetCSS.includes('text-align')) return '這個屬性會改變字體大小，但客戶要求的是對齊方式（text-align）。';
  return '樣式還沒完全符合目標喔，再看看目標預覽，仔細比較哪裡不一樣。';
}

function detectErrorType(css, lv) {
  if(!css.includes(';')) return 'semicolon';
  if(css.includes('margin') && lv.targetCSS.includes('padding')) return 'spacing';
  if(css.includes('padding') && lv.targetCSS.includes('margin')) return 'spacing';
  if(!css.includes('{') && lv.mode >= 2) return 'selector';
  return 'property';
}

function checkAndAwardBadges() {
  const done = userData.completedLevels;
  // First step
  if (done.size >= 1 && !userData.badges.includes('first_step')) {
    userData.badges.push('first_step');
  }
  // Streak 3
  if (userData.streak >= 3 && !userData.badges.includes('streak3')) {
    userData.badges.push('streak3');
  }
  // Text chapter done (chapter 1, all 5 levels)
  const textLevels = ALL_LEVELS.filter(l => l.chapter === 1);
  if (textLevels.every(l => done.has(l.id)) && !userData.badges.includes('text_chapter')) {
    userData.badges.push('text_chapter');
  }
  // Speed run — checked in showCompleteOverlay
}

function resetEditor() {
  const lv = gameState.level;
  if(!lv) return;
  document.getElementById('code-input').value = lv.baseCSS || '';
  updateLineNumbers();
  updateLivePreview();
  document.getElementById('live-preview').classList.remove('match', 'mismatch');
  closeFeedback();
  document.getElementById('btn-submit').disabled = false;
  hideAutocomplete();
}

/* ───── Feedback ───── */
function showFeedback(type, title, body, why) {
  const panel = document.getElementById('feedback-panel');
  const icons = { success:'✅', error:'❌', warn:'⚠️' };
  document.getElementById('feedback-icon').textContent = icons[type];
  document.getElementById('feedback-title').textContent = title;
  document.getElementById('feedback-body').textContent = body;
  const whyEl = document.getElementById('feedback-why');
  if(why) { whyEl.innerHTML = why; whyEl.style.display = ''; }
  else { whyEl.style.display = 'none'; }
  panel.className = 'feedback-panel ' + type;
  panel.classList.add('visible');
  gameState.feedbackVisible = true;
}

function closeFeedback() {
  document.getElementById('feedback-panel').classList.remove('visible');
  gameState.feedbackVisible = false;
}

function onFeedbackConfirm() {
  // User has read the explanation — now show the completion overlay
  closeFeedback();
  showCompleteOverlay();
}

function toggleHint() {
  const txt = document.getElementById('hint-text');
  const toggle = document.querySelector('.hint-toggle');
  const visible = txt.classList.toggle('visible');
  toggle.textContent = visible ? '隱藏提示' : '顯示提示';
}

/* ───── Level Complete ───── */
function showCompleteOverlay() {
  const elapsed = Math.round((Date.now() - gameState.startTime) / 1000);
  const stars = gameState.tries <= 1 ? 3 : gameState.tries <= 3 ? 2 : 1;
  const xp = stars * 20 + 10;

  const emojis = ['🎉','⭐','🚀','✨','🏆'];
  document.getElementById('complete-emoji').textContent = emojis[Math.floor(Math.random()*emojis.length)];
  document.getElementById('complete-title').textContent = stars === 3 ? '完美通關！' : stars === 2 ? '很棒！' : '通關了！';
  document.getElementById('complete-sub').textContent = gameState.level.successMsg || '你成功完成了這一關！';
  document.getElementById('cstat-time').textContent = elapsed + 's';
  document.getElementById('cstat-tries').textContent = gameState.tries;
  document.getElementById('cstat-xp').textContent = '+' + xp;

  // Stars
  const starsEl = document.getElementById('complete-stars');
  starsEl.innerHTML = Array.from({length:3}, (_,i) => `<span class="complete-star ${i<stars?'lit':''}">⭐</span>`).join('');

  userData.totalXP += xp;
  // Speedrun badge
  if (elapsed <= 60 && !userData.badges.includes('speedrun')) {
    userData.badges.push('speedrun');
  }
  recordPlaySession();
  saveUserData();

  const overlay = document.getElementById('complete-overlay');
  overlay.classList.add('visible');
  // Animate stars
  starsEl.querySelectorAll('.complete-star.lit').forEach((s, i) => {
    s.style.opacity = '0';
    s.style.transform = 'scale(0.5)';
    setTimeout(() => {
      s.style.transition = 'all 0.3s cubic-bezier(0.34,1.56,0.64,1)';
      s.style.opacity = '1';
      s.style.transform = 'scale(1)';
    }, 400 + i * 150);
  });
}

function nextLevel() {
  document.getElementById('complete-overlay').classList.remove('visible');
  closeFeedback();

  const allChLevels = ALL_LEVELS.filter(l => l.chapter === gameState.level.chapter);
  const idx = allChLevels.indexOf(gameState.level);
  const next = allChLevels[idx + 1];
  if(next) {
    startLevel(next.id);
  } else {
    // Chapter done!
    const doneChId = gameState.level.chapter;
    userData.chapterStatus[doneChId] = 'done';
    const nextChId = doneChId + 1;
    if (nextChId < CHAPTERS.length && getChapterStatus(nextChId) === 'locked') {
      userData.chapterStatus[nextChId] = 'active';
    }
    saveUserData();
    showScreen('home');
    renderHome();
  }
}

function replayLevel() {
  document.getElementById('complete-overlay').classList.remove('visible');
  startLevel(gameState.level.id);
}

function confirmLeave() {
  // Build a custom in-page dialog instead of browser confirm (better UX on mobile)
  showLeaveDialog();
}

function showLeaveDialog() {
  const existing = document.getElementById('leave-dialog');
  if (existing) existing.remove();
  const dlg = document.createElement('div');
  dlg.id = 'leave-dialog';
  dlg.style.cssText = 'position:fixed;inset:0;background:rgba(9,15,28,0.88);backdrop-filter:blur(8px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;';
  dlg.innerHTML = `
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:24px;max-width:300px;width:100%;text-align:center;">
      <div style="font-size:40px;margin-bottom:12px;">🚪</div>
      <div style="font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:8px;">退出關卡？</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6;">你的完成進度已自動儲存。<br>未完成的本關不計入記錄。</div>
      <div style="display:flex;gap:8px;">
        <button onclick="closeLeaveDialog()" style="flex:1;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;">繼續練習</button>
        <button onclick="doLeave()" style="flex:1;height:40px;border-radius:10px;background:var(--error);color:#fff;font-size:13px;font-weight:700;cursor:pointer;">確定退出</button>
      </div>
    </div>`;
  document.body.appendChild(dlg);
}

function closeLeaveDialog() {
  const dlg = document.getElementById('leave-dialog');
  if (dlg) dlg.remove();
}

function doLeave() {
  closeLeaveDialog();
  document.getElementById('complete-overlay').classList.remove('visible');
  saveUserData();
  showScreen('home');
  renderHome();
}

/* ═══════════════════════════════════════════════════
   ANALYTICS
═══════════════════════════════════════════════════ */
function renderAnalytics() {
  // Error breakdown — from real data
  const errEntries = Object.entries(userData.errors || {}).sort((a,b)=>b[1]-a[1]);
  const ERR_LABEL_MAP = {
    semicolon: '漏掉分號',
    spacing:   'padding/margin 混淆',
    property:  '屬性名稱錯誤',
    selector:  '選取器語法',
    flex:      'Flex 對齊觀念',
  };
  if (errEntries.length === 0) {
    document.getElementById('error-breakdown').innerHTML = '<div style="font-size:13px;color:var(--text3);padding:4px 0;">還沒有錯誤記錄，繼續加油！</div>';
  } else {
    const errMax = Math.max(...errEntries.map(e=>e[1]));
    document.getElementById('error-breakdown').innerHTML = errEntries.slice(0,5).map(([k,v]) =>
      `<div class="error-row">
        <div class="error-label">${ERR_LABEL_MAP[k] || k}</div>
        <div class="error-bar-wrap"><div class="error-bar-fill" style="width:${Math.round((v/errMax)*100)}%"></div></div>
        <div class="error-count">${v}</div>
      </div>`
    ).join('');
  }

  // Week chart — show actual sessions (use sessionsToday for today's bar)
  const weekLabels = ['一','二','三','四','五','六','日'];
  const todayIdx   = (new Date().getDay() + 6) % 7; // Mon=0
  const weekVals   = weekLabels.map((_,i) => i === todayIdx ? userData.sessionsToday : 0);
  const weekMax    = Math.max(...weekVals, 1);
  document.getElementById('week-chart').innerHTML = weekLabels.map((d,i) =>
    `<div class="chart-bar-col">
      <div class="chart-bar" style="height:${Math.round((weekVals[i]/weekMax)*70)}px;opacity:${i===todayIdx?1:0.3}"></div>
      <div class="chart-bar-lbl">${d}</div>
    </div>`
  ).join('');

  // Weakness
  const weaks = computeWeaknesses();
  if (weaks.length === 0) {
    document.getElementById('analytics-weakness').innerHTML = '<div style="font-size:13px;color:var(--text3);padding:4px 0;">完成幾關後，這裡會顯示你的弱點 💪</div>';
  } else {
    document.getElementById('analytics-weakness').innerHTML = weaks.map(w =>
      `<div class="weakness-item" onclick="drillWeakness('${w.key}')">
        <span class="weakness-icon">${w.icon}</span>
        <span class="weakness-text">${w.text}</span>
        <button class="weakness-btn">加強訓練</button>
      </div>`
    ).join('');
  }
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  userData = loadUserData(); // ensure fresh load
  recordVisit();             // mark today as visited (for streak)
  renderHome();
  // Prevent zoom on double-tap iOS
  let lastTap = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if(now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, { passive: false });
  // Hide autocomplete on outside click
  document.addEventListener('click', (e) => {
    if(!e.target.closest('.code-editor-wrap')) hideAutocomplete();
  });
  // Handle keyboard on mobile
  window.addEventListener('resize', () => {
    if(currentScreen === 'game') {
      // When keyboard pops up on mobile
      document.getElementById('game-body').style.maxHeight = window.innerHeight - 54 + 'px';
    }
  });
});
</script>
