<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎨 Designer's CSS Cheat Sheet</title>
  <style>
    :root {
      --bg-page: #F0EEE8;
      --font-body: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
      --font-mono: "Fira Code", "Courier New", Courier, monospace;
      --color-pink: #ED93B1;   --color-pink-dark: #72243E;   --color-pink-light: #FBEAF0;
      --color-teal: #1D9E75;   --color-teal-dark: #085041;   --color-teal-light: #E1F5EE;
      --color-purple: #7F77DD; --color-purple-dark: #3C3489; --color-purple-light: #EEEDFE;
      --color-amber: #EF9F27;  --color-amber-dark: #633806;  --color-amber-light: #FAEEDA;
      --color-coral: #D85A30;  --color-coral-dark: #4A1B0C;  --color-coral-light: #FAECE7;
      --color-blue: #378ADD;   --color-blue-dark: #0C447C;   --color-blue-light: #E6F1FB;
      --color-green: #639922;  --color-green-dark: #27500A;  --color-green-light: #EAF3DE;
      --color-red: #E24B4A;    --color-red-dark: #501313;    --color-red-light: #FCEBEB;
      --color-gray: #888780;   --color-gray-dark: #2C2C2A;   --color-gray-light: #F1EFE8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-page); color: #33322E; font-family: var(--font-body); line-height: 1.6; padding: 40px 20px; }
    .container { max-width: 960px; margin: 0 auto; }

    .hero { background: white; border-radius: 16px; padding: 36px 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 28px; border: 1px solid #E2DFD5; }
    .hero h1 { font-size: 2rem; color: #1E1E1C; margin-bottom: 6px; }
    .hero p { color: #66645E; font-size: 1rem; margin-bottom: 24px; }

    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1.1rem; pointer-events: none; opacity: 0.45; }
    #searchInput { width: 100%; padding: 14px 50px 14px 46px; font-size: 1rem; font-family: var(--font-body); border: 2px solid #E2DFD5; border-radius: 10px; background: #FAFAF8; color: #33322E; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    #searchInput:focus { border-color: var(--color-purple); box-shadow: 0 0 0 4px #EEEDFE; background: white; }
    #clearBtn { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: #EEEDE9; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 0.85rem; color: #888780; display: none; align-items: center; justify-content: center; transition: background 0.15s; }
    #clearBtn:hover { background: #E2DFD5; color: #33322E; }
    #clearBtn.visible { display: flex; }

    .quick-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .quick-tag { font-size: 0.78rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; user-select: none; }
    .quick-tag:hover { opacity: 0.8; transform: translateY(-1px); }
    .quick-tag.active { outline: 2px solid currentColor; outline-offset: 2px; }

    .search-meta { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 14px; min-height: 24px; }
    .result-count { font-size: 0.85rem; color: #888780; }
    .result-count strong { color: var(--color-purple-dark); }
    .sort-wrap { display: flex; gap: 6px; }
    .sort-btn { font-size: 0.78rem; font-weight: 600; padding: 3px 10px; border-radius: 6px; border: 1px solid #E2DFD5; background: white; cursor: pointer; color: #66645E; transition: all 0.15s; }
    .sort-btn.active { background: var(--color-purple-light); color: var(--color-purple-dark); border-color: var(--color-purple); }

    #results { display: flex; flex-direction: column; gap: 14px; }

    .result-card { background: white; border: 1px solid #EAE8E1; border-radius: 12px; padding: 20px 22px; position: relative; overflow: hidden; transition: box-shadow 0.2s, transform 0.15s; }
    .result-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--card-accent, #888780); }
    .result-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.08); transform: translateY(-1px); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .card-section-badge { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap; margin-top: 2px; flex-shrink: 0; }
    .card-title { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: #1E1E1C; margin-bottom: 4px; }
    .card-title mark { background: #FFF3B0; color: #1E1E1C; border-radius: 2px; padding: 0 2px; }
    .card-desc { font-size: 0.88rem; color: #5A5952; margin-bottom: 10px; }
    .card-desc mark { background: #FFF3B0; color: #33322E; border-radius: 2px; padding: 0 2px; }

    .warn-box { padding: 9px 12px; border-radius: 6px; font-size: 0.83rem; display: flex; gap: 6px; line-height: 1.4; margin-bottom: 10px; }
    .warn-box.type-warn { background: #FFF9E6; border: 1px solid #FFEAA8; color: #7A5700; }
    .warn-box.type-tip  { background: #EBF8FF; border: 1px solid #BEE3F8; color: #2B6CB0; }
    .warn-box.type-rec  { background: #F0FDF4; border: 1px solid #BBF7D0; color: #166534; }

    .code-preview { background: #EEEDE9; border: 1px solid #E2DFD5; border-radius: 6px; padding: 10px 12px; font-family: var(--font-mono); font-size: 0.82rem; color: #33322E; white-space: pre; overflow-x: auto; position: relative; cursor: pointer; }
    .code-preview mark { background: #FFE680; color: #33322E; border-radius: 2px; }
    .copy-hint { position: absolute; right: 8px; top: 6px; font-size: 0.7rem; color: #888780; opacity: 0; transition: opacity 0.2s; font-family: var(--font-body); pointer-events: none; }
    .code-preview:hover .copy-hint { opacity: 1; }
    .copy-hint.copied { color: var(--color-teal-dark); opacity: 1 !important; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .card-tag { font-size: 0.72rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: #EBEAE4; color: #5A5952; }

    .empty-state { text-align: center; padding: 60px 20px; color: #888780; }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }
    .empty-state span { color: var(--color-purple); font-weight: 600; }

    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2C2C2A; color: white; padding: 10px 20px; border-radius: 8px; font-size: 0.88rem; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 1000; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .kbd { display: inline-block; background: #EEEDE9; border: 1px solid #D5D3CC; border-radius: 4px; padding: 1px 6px; font-family: var(--font-mono); font-size: 0.75rem; color: #66645E; }

    @media print {
      body { background: white; padding: 0; }
      .hero, .result-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
      .quick-tags, .search-meta, #searchInput, #clearBtn { display: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="hero">
    <h1>🎨 Designer's CSS Cheat Sheet</h1>
    <p>專為 UI/UX 設計師打造的網頁排版與樣式指南。用中文描述問題也能找到答案。按 <span class="kbd">/</span> 快速聚焦搜尋框。</p>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="例如：按鈕間距太擠、圖片變形、文字超出範圍、卡片等高…" autocomplete="off" spellcheck="false">
      <button id="clearBtn" title="清除">✕</button>
    </div>
    <div class="quick-tags" id="quickTags">
      <span class="quick-tag" style="background:var(--color-pink-light);color:var(--color-pink-dark)"     data-query="卡片">🃏 卡片</span>
      <span class="quick-tag" style="background:var(--color-purple-light);color:var(--color-purple-dark)" data-query="按鈕">🔘 按鈕</span>
      <span class="quick-tag" style="background:var(--color-teal-light);color:var(--color-teal-dark)"     data-query="間距">📐 間距</span>
      <span class="quick-tag" style="background:var(--color-amber-light);color:var(--color-amber-dark)"   data-query="文字">🔤 文字</span>
      <span class="quick-tag" style="background:var(--color-coral-light);color:var(--color-coral-dark)"   data-query="flex">🧱 Flex</span>
      <span class="quick-tag" style="background:var(--color-blue-light);color:var(--color-blue-dark)"     data-query="圖片">🖼 圖片</span>
      <span class="quick-tag" style="background:var(--color-pink-light);color:var(--color-pink-dark)"     data-query="hover">✨ Hover</span>
      <span class="quick-tag" style="background:var(--color-green-light);color:var(--color-green-dark)"   data-query="容器">📦 容器</span>
      <span class="quick-tag" style="background:var(--color-gray-light);color:var(--color-gray-dark)"     data-query="grid">🧩 Grid</span>
      <span class="quick-tag" style="background:var(--color-purple-light);color:var(--color-purple-dark)" data-query="animation">🎬 動畫</span>
      <span class="quick-tag" style="background:var(--color-gray-light);color:var(--color-gray-dark)"     data-query="shadow">🌑 陰影</span>
      <span class="quick-tag" style="background:var(--color-blue-light);color:var(--color-blue-dark)"     data-query="responsive">📱 響應式</span>
      <span class="quick-tag" style="background:var(--color-red-light);color:var(--color-red-dark)"       data-query="devtools">🔧 除錯</span>
    </div>
  </header>

  <div class="search-meta">
    <div class="result-count" id="resultCount"></div>
    <div class="sort-wrap">
      <button class="sort-btn active" id="sortRelevance" onclick="setSort('relevance')">相關度</button>
      <button class="sort-btn" id="sortCategory" onclick="setSort('category')">分類</button>
    </div>
  </div>
  <div id="results"></div>
</div>
<div id="toast">✅ 已複製到剪貼簿</div>

<script>
const DATA = [
  // 🃏 卡片設計
  { id:1,  section:"🃏 卡片設計", accent:"#ED93B1", badgeBg:"#FBEAF0", badgeColor:"#72243E",
    title:"border-radius & overflow",
    desc:"卡片頂部有滿版圖片時，必須加 overflow: hidden，否則圖片直角會刺穿圓角。對應 Figma 的 Clip Content。",
    code:".card {\n  border-radius: 16px;\n  overflow: hidden; /* 圖片不刺穿圓角的關鍵 */\n}",
    warn:{type:"tip", text:"💡 Figma 對應：Frame → Clip Content 打勾"},
    tags:["border-radius","overflow","Figma: Clip Content"],
    keys:["圓角","裁切","overflow","radius","卡片","card","clip"] },

  { id:2,  section:"🃏 卡片設計", accent:"#ED93B1", badgeBg:"#FBEAF0", badgeColor:"#72243E",
    title:"box-shadow（卡片陰影）",
    desc:"多層陰影疊加比單層更自然，模擬真實光線。第一層大範圍擴散，第二層緊貼輪廓加深。",
    code:"/* 輕量浮起感 */\nbox-shadow: 0 2px 8px rgba(0,0,0,0.08),\n            0 1px 2px rgba(0,0,0,0.04);\n\n/* 明顯懸浮感 */\nbox-shadow: 0 8px 32px rgba(0,0,0,0.12),\n            0 2px 8px rgba(0,0,0,0.06);\n\n/* 色彩陰影（品牌感） */\nbox-shadow: 0 8px 24px rgba(127,119,221,0.3);",
    tags:["box-shadow","shadow","elevation"],
    keys:["陰影","shadow","elevation","box-shadow","浮起","卡片","立體"] },

  { id:3,  section:"🃏 卡片設計", accent:"#ED93B1", badgeBg:"#FBEAF0", badgeColor:"#72243E",
    title:"aspect-ratio（固定圖片比例）",
    desc:"強制圖片容器維持固定比例，不論原始尺寸為何都能整齊排列，是卡片列表的必備屬性。",
    code:".card-img {\n  aspect-ratio: 16 / 9; /* 也可以用 4/3、1/1、3/2 */\n  overflow: hidden;\n}\n.card-img img {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n}",
    tags:["aspect-ratio","object-fit","圖片比例"],
    keys:["比例","aspect","圖片","object-fit","裁切","16:9","正方形","卡片"] },

  { id:4,  section:"🃏 卡片設計", accent:"#ED93B1", badgeBg:"#FBEAF0", badgeColor:"#72243E",
    title:"卡片 Hover 升起效果",
    desc:"懸停時上移並加深陰影，給使用者明確的可點擊回饋。transition 讓動作流暢。",
    code:".card {\n  transition: transform 0.2s ease, box-shadow 0.2s ease;\n  cursor: pointer;\n}\n.card:hover {\n  transform: translateY(-4px);\n  box-shadow: 0 12px 40px rgba(0,0,0,0.14);\n}",
    tags:["hover","transition","transform","升起"],
    keys:["hover","升起","動畫","transition","卡片","互動","懸停"] },

  { id:5,  section:"🃏 卡片設計", accent:"#ED93B1", badgeBg:"#FBEAF0", badgeColor:"#72243E",
    title:"卡片等高 + 按鈕對齊底部",
    desc:"用 Flex column 讓卡片縱向排列，margin-top: auto 將按鈕推到底部，不論內容多寡都對齊。",
    code:".card {\n  display: flex;\n  flex-direction: column;\n  height: 100%;\n}\n.card-footer {\n  margin-top: auto; /* 按鈕永遠釘在底部 */\n  padding-top: 16px;\n}",
    warn:{type:"rec", text:"✅ 卡片列表黃金公式：父層用 Grid/Flex stretch，卡片用 flex column + margin-top auto"},
    tags:["flex","margin-top:auto","等高卡片"],
    keys:["卡片","flex","column","縱向","按鈕對齊","底部","等高","stretch"] },

  // 🔘 按鈕設計
  { id:10, section:"🔘 按鈕設計", accent:"#7F77DD", badgeBg:"#EEEDFE", badgeColor:"#3C3489",
    title:"按鈕基礎重置",
    desc:"移除瀏覽器預設樣式，建立一致的按鈕起始點。幾乎每個專案都要用到，其他樣式疊加在這之上。",
    code:".btn {\n  appearance: none;\n  border: none;\n  font-family: inherit; /* 繼承頁面字型 */\n  font-weight: 600;\n  font-size: 14px;\n  padding: 10px 20px;\n  border-radius: 6px;\n  cursor: pointer;\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  transition: all 0.2s;\n  text-decoration: none;\n  white-space: nowrap;\n}",
    warn:{type:"warn", text:"⚠️ 記得加 font-family: inherit，否則按鈕字型會和頁面不一樣"},
    tags:["appearance","reset","按鈕基礎"],
    keys:["按鈕","button","reset","appearance","基礎","重置","font-family"] },

  { id:11, section:"🔘 按鈕設計", accent:"#7F77DD", badgeBg:"#EEEDFE", badgeColor:"#3C3489",
    title:"Solid / Outline / Ghost 三種變體",
    desc:"對應不同視覺權重：主要操作用 Solid、次要用 Outline、再次要用 Ghost。同頁面最多同時出現兩種。",
    code:"/* Solid — 最重，主要 CTA */\n.btn-solid { background: #7F77DD; color: white; }\n.btn-solid:hover { background: #3C3489; }\n\n/* Outline — 次要操作 */\n.btn-outline {\n  background: transparent;\n  border: 2px solid #7F77DD;\n  color: #7F77DD;\n}\n.btn-outline:hover { background: #EEEDFE; }\n\n/* Ghost — 最輕，輔助操作 */\n.btn-ghost { background: transparent; color: #7F77DD; }\n.btn-ghost:hover { background: #EEEDFE; }",
    tags:["solid","outline","ghost","按鈕變體"],
    keys:["按鈕","solid","outline","ghost","樣式","variant","primary","secondary"] },

  { id:12, section:"🔘 按鈕設計", accent:"#7F77DD", badgeBg:"#EEEDFE", badgeColor:"#3C3489",
    title:"按鈕尺寸（sm / md / lg）",
    desc:"透過 padding 和 font-size 控制大小，不要直接設定 width/height，讓內容決定寬度。",
    code:".btn-sm { padding: 6px 14px;  font-size: 12px; border-radius: 4px; }\n.btn-md { padding: 10px 20px; font-size: 14px; border-radius: 6px; } /* 預設 */\n.btn-lg { padding: 14px 28px; font-size: 16px; border-radius: 8px; }\n\n/* 全寬按鈕（常用在手機版） */\n.btn-full { width: 100%; justify-content: center; }",
    tags:["btn-sm","btn-lg","按鈕尺寸"],
    keys:["按鈕","大小","尺寸","sm","lg","size","全寬","mobile"] },

  { id:13, section:"🔘 按鈕設計", accent:"#7F77DD", badgeBg:"#EEEDFE", badgeColor:"#3C3489",
    title:"Pill 膠囊 & 圓形圖示按鈕",
    desc:"border-radius 設極大值讓按鈕變膠囊形。圓形圖示按鈕需固定寬高並設 border-radius: 50%。",
    code:"/* 膠囊形 */\n.btn-pill { border-radius: 99px; }\n\n/* 圓形圖示按鈕 */\n.btn-icon {\n  width: 40px;\n  height: 40px;\n  padding: 0;\n  border-radius: 50%;\n  justify-content: center;\n}",
    tags:["pill","border-radius","圓形","圖示按鈕"],
    keys:["膠囊","pill","圓角","border-radius","圓形","icon button","按鈕"] },

  { id:14, section:"🔘 按鈕設計", accent:"#7F77DD", badgeBg:"#EEEDFE", badgeColor:"#3C3489",
    title:"Loading spinner 狀態",
    desc:"按鈕點擊後顯示 Loading，用純 CSS animation 做旋轉圈圈，不需要圖片或 JS 函式庫。",
    code:"@keyframes spin {\n  to { transform: rotate(360deg); }\n}\n.spinner {\n  width: 14px; height: 14px;\n  border: 2px solid rgba(255,255,255,0.35);\n  border-top-color: white;\n  border-radius: 50%;\n  animation: spin 0.8s linear infinite;\n  flex-shrink: 0;\n}",
    warn:{type:"tip", text:"💡 Outline 按鈕的 spinner 顏色要改成主題色，不是 white"},
    tags:["loading","spinner","animation","disabled"],
    keys:["loading","spinner","動畫","旋轉","animation","keyframe","按鈕","disabled"] },

  { id:15, section:"🔘 按鈕設計", accent:"#7F77DD", badgeBg:"#EEEDFE", badgeColor:"#3C3489",
    title:"按鈕間距設定（padding & gap）",
    desc:"按鈕本身用 padding 控制內部空間，按鈕群組用 gap 控制彼此距離，不要用 margin 推按鈕。",
    code:"/* ✅ 按鈕群組 — 用 gap */\n.btn-group {\n  display: flex;\n  align-items: center;\n  gap: 8px;        /* 按鈕之間的距離 */\n  flex-wrap: wrap; /* 手機版自動換行 */\n}\n\n/* ✅ 按鈕內距 — 用 padding */\n.btn { padding: 10px 20px; }\n\n/* ❌ 不建議 */\n/* .btn { margin-right: 8px; } */",
    warn:{type:"rec", text:"✅ 黃金比例：padding 上下 = 左右的一半。例如 padding: 10px 20px"},
    tags:["padding","gap","按鈕間距","btn-group"],
    keys:["按鈕","間距","padding","gap","太擠","群組","排列","btn-group","button spacing","內距","空間"] },

  { id:16, section:"🔘 按鈕設計", accent:"#7F77DD", badgeBg:"#EEEDFE", badgeColor:"#3C3489",
    title:"Danger / Success 語意按鈕",
    desc:"刪除、警告等危險操作用紅色，成功確認用綠色。顏色傳達語意，讓使用者在操作前有正確預期。",
    code:".btn-danger  { background: #E24B4A; color: white; }\n.btn-danger:hover  { background: #501313; }\n\n.btn-success { background: #1D9E75; color: white; }\n.btn-success:hover { background: #085041; }\n\n.btn-warning { background: #EF9F27; color: white; }\n.btn-warning:hover { background: #633806; }",
    tags:["danger","success","warning","語意顏色"],
    keys:["危險","刪除","danger","success","warning","顏色","語意","按鈕","紅色","綠色"] },

  // 📐 間距控制
  { id:20, section:"📐 間距控制", accent:"#1D9E75", badgeBg:"#E1F5EE", badgeColor:"#085041",
    title:"padding vs margin 根本差異",
    desc:"padding 是往內撐開（背景色會填入），margin 是往外推開（背景色不填入）。Flexbox 中盡量用 gap 代替 margin。",
    code:"/* padding：背景色填滿，影響點擊範圍 */\n.btn { padding: 10px 20px; }\n\n/* margin：推開外部元素，背景不填入 */\n.section { margin-bottom: 40px; }\n\n/* 常用縮寫順序（順時針）*/\npadding: 16px;               /* 四邊相同 */\npadding: 12px 24px;          /* 上下 左右 */\npadding: 8px 16px 12px 20px; /* 上 右 下 左 */",

/* ====== STATE ====== */
let query = "";
let sortMode = "relevance";

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sortRelevance').classList.toggle('active', mode==='relevance');
  document.getElementById('sortCategory').classList.toggle('active', mode==='category');
  render();
}

/* ====== SEARCH ENGINE ====== */
function score(item, q) {
  if (!q) return 1;
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  let s = 0;
  for (const t of terms) {
    if (item.title.toLowerCase().includes(t))  s += 10;
    if (item.desc.toLowerCase().includes(t))   s += 5;
    if (item.code.toLowerCase().includes(t))   s += 4;
    if (item.tags.some(g => g.toLowerCase().includes(t))) s += 7;
    if (item.keys.some(k => k.toLowerCase().includes(t))) s += 8;
    if (item.section.toLowerCase().includes(t)) s += 3;
    if (item.warn && item.warn.text.toLowerCase().includes(t)) s += 2;
  }
  return s;
}

function highlight(text, q) {
  if (!q) return text;
  const terms = q.trim().toLowerCase().split(/\s+/).filter(Boolean);
  let r = text;
  for (const t of terms) {
    const e = t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    r = r.replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>');
  }
  return r;
}

function search() {
  const q = query.trim();
  let res = DATA.map(item => ({...item, _s: score(item,q)})).filter(i => !q || i._s > 0);
  if (sortMode==='relevance' && q) res.sort((a,b)=>b._s-a._s);
  else res.sort((a,b)=>a.id-b.id);
  return res;
}

/* ====== RENDER ====== */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const q = query.trim();
  const res = search();
  const el = document.getElementById('results');
  const ct = document.getElementById('resultCount');

  ct.innerHTML = !q
    ? `共 <strong>${DATA.length}</strong> 個屬性 — 輸入關鍵字或用中文描述問題`
    : res.length > 0
      ? `找到 <strong>${res.length}</strong> 個結果`
      : `找不到「<strong>${esc(q)}</strong>」的結果`;

  if (!res.length && q) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">🤔</div><p>找不到 <span>${esc(q)}</span> 的相關結果</p><p style="margin-top:8px;font-size:0.85rem;color:#aaa">試試換個說法，或點上方快速標籤瀏覽</p></div>`;
    return;
  }

  el.innerHTML = res.map(item => {
    const w = item.warn ? `<div class="warn-box type-${item.warn.type}">${item.warn.text}</div>` : '';
    return `<div class="result-card" style="--card-accent:${item.accent}">
      <div class="card-top">
        <div style="min-width:0">
          <div class="card-title">${highlight(esc(item.title),q)}</div>
          <div class="card-desc">${highlight(esc(item.desc),q)}</div>
        </div>
        <span class="card-section-badge" style="background:${item.badgeBg};color:${item.badgeColor}">${item.section}</span>
      </div>
      ${w}
      <div class="code-preview" onclick="copyCode(this,event)">
${highlight(esc(item.code),q)}<span class="copy-hint">點擊複製</span></div>
      <div class="card-tags">${item.tags.map(t=>`<span class="card-tag">${highlight(esc(t),q)}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

/* ====== COPY ====== */
function copyCode(el,e) {
  if(e) e.stopPropagation();
  const text = el.innerText.replace(/點擊複製$/,'').trim();
  navigator.clipboard.writeText(text).then(() => {
    const h = el.querySelector('.copy-hint');
    if(h){ h.textContent='✅ 已複製'; h.classList.add('copied'); setTimeout(()=>{ h.textContent='點擊複製'; h.classList.remove('copied'); },1800); }
    const t = document.getElementById('toast');
    t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000);
  });
}

/* ====== EVENTS ====== */
const input = document.getElementById('searchInput');
const clrBtn = document.getElementById('clearBtn');

input.addEventListener('input', () => {
  query = input.value;
  clrBtn.classList.toggle('visible', query.length>0);
  document.querySelectorAll('.quick-tag').forEach(t=>t.classList.remove('active'));
  render();
});

clrBtn.addEventListener('click', () => {
  input.value=''; query=''; clrBtn.classList.remove('visible');
  document.querySelectorAll('.quick-tag').forEach(t=>t.classList.remove('active'));
  input.focus(); render();
});

document.querySelectorAll('.quick-tag').forEach(tag => {
  tag.addEventListener('click', () => {
    const q = tag.dataset.query;
    const active = tag.classList.contains('active');
    document.querySelectorAll('.quick-tag').forEach(t=>t.classList.remove('active'));
    if(active){ input.value=''; query=''; clrBtn.classList.remove('visible'); }
    else { tag.classList.add('active'); input.value=q; query=q; clrBtn.classList.add('visible'); }
    render();
  });
});

document.addEventListener('keydown', e => {
  if(e.key==='/' && document.activeElement!==input){ e.preventDefault(); input.focus(); input.select(); }
  if(e.key==='Escape') input.blur();
});

render();
</script>
